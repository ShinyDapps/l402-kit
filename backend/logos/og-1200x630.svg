<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#080808"/>
  <!-- orange glow top-left -->
  <radialGradient id="g1" cx="20%" cy="20%" r="50%">
    <stop offset="0%" stop-color="#f7931a" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#f7931a" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <!-- orange glow bottom-right -->
  <radialGradient id="g2" cx="80%" cy="80%" r="45%">
    <stop offset="0%" stop-color="#f7931a" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="#f7931a" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#g2)"/>
  <!-- ⚡ icon -->
  <text x="600" y="210" font-family="system-ui,sans-serif" font-size="80" text-anchor="middle" fill="#f7931a">⚡</text>
  <!-- headline -->
  <text x="600" y="305" font-family="system-ui,sans-serif" font-size="62" font-weight="700" text-anchor="middle" fill="#ffffff" letter-spacing="-2">l402-kit</text>
  <!-- sub -->
  <text x="600" y="370" font-family="system-ui,sans-serif" font-size="26" text-anchor="middle" fill="#8a8f98">Bitcoin Lightning payments for any API</text>
  <text x="600" y="410" font-family="system-ui,sans-serif" font-size="22" text-anchor="middle" fill="#555">3 lines of code · TypeScript · Python · Go · Rust</text>
  <!-- badge row -->
  <rect x="410" y="460" width="380" height="44" rx="22" fill="rgba(247,147,26,0.12)" stroke="#f7931a" stroke-width="1" stroke-opacity="0.4"/>
  <text x="600" y="489" font-family="system-ui,sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#f7931a" letter-spacing="1">MIT · Open Source · No account needed</text>
  <!-- domain -->
  <text x="600" y="570" font-family="system-ui,monospace" font-size="18" text-anchor="middle" fill="#444">l402kit.com</text>
</svg>
