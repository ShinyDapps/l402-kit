<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>l402-kit — End-to-End Demo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

.wrapper { width: 860px; }

.title-bar { text-align: center; margin-bottom: 32px; }
.title-bar h1 { font-size: 28px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
.title-bar h1 span { color: #f7931a; }
.title-bar p { color: #666; font-size: 14px; margin-top: 8px; }

.terminal { background: #111; border: 1px solid #222; border-radius: 12px; overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,.7); }
.term-bar { background: #1a1a1a; padding: 12px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #222; }
.dot { width: 12px; height: 12px; border-radius: 50%; }
.dot.red { background: #ff5f57; }
.dot.yellow { background: #ffbd2e; }
.dot.green { background: #28c840; }
.term-title { flex: 1; text-align: center; font-size: 12px; color: #555; font-family: monospace; }
.term-body { padding: 20px 24px; min-height: 360px; position: relative; overflow: hidden; }

.line { font-family: "SF Mono", "Fira Code", monospace; font-size: 13px; line-height: 1.9; white-space: pre; opacity: 0; }
.line.visible { opacity: 1; }
.prompt { color: #4ade80; }
.cmd { color: #e5e5e5; }
.comment { color: #555; }
.output { color: #888; }
.orange { color: #f7931a; }
.green { color: #4ade80; }
.red { color: #f87171; }
.blue { color: #60a5fa; }
.purple { color: #c084fc; }
.cursor { display: inline-block; width: 8px; height: 14px; background: #f7931a; animation: blink .8s step-end infinite; vertical-align: middle; margin-left: 2px; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.phase-label { display: flex; gap: 10px; align-items: center; padding: 10px 16px; background: #0f0f0f; border-top: 1px solid #1a1a1a; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #444; transition: color .3s; }
.phase-label.active { color: #f7931a; }
.phase-dot { width: 6px; height: 6px; border-radius: 50%; background: #333; transition: background .3s; }
.phase-dot.active { background: #f7931a; box-shadow: 0 0 6px #f7931a; }

.flow { display: flex; justify-content: center; gap: 0; margin-top: 24px; }
.flow-step { text-align: center; padding: 12px 20px; position: relative; opacity: .3; transition: opacity .4s; }
.flow-step.active { opacity: 1; }
.flow-step:not(:last-child)::after { content: "→"; position: absolute; right: -8px; top: 50%; transform: translateY(-50%); color: #333; font-size: 18px; }
.flow-step.active:not(:last-child)::after { color: #f7931a; }
.step-icon { font-size: 22px; margin-bottom: 6px; }
.step-name { font-size: 11px; color: #888; font-weight: 600; }

.progress { height: 2px; background: #111; position: relative; overflow: hidden; }
.progress-bar { height: 100%; background: linear-gradient(90deg, #f7931a, #ff6b35); width: 0; transition: width .3s linear; }

.replay-btn { display: block; margin: 20px auto 0; padding: 10px 28px; background: #f7931a; color: #000; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; opacity: 0; transition: opacity .4s; }
.replay-btn.visible { opacity: 1; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="title-bar">
    <h1>⚡ <span>l402-kit</span> — End-to-End Flow</h1>
    <p>From install to first paid API call — 45 seconds</p>
  </div>

  <div class="progress"><div class="progress-bar" id="progressBar"></div></div>

  <div class="terminal">
    <div class="term-bar">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <div class="term-title">bash — l402-demo</div>
    </div>
    <div class="term-body" id="termBody"></div>
    <div class="phase-label" id="phaseLabel">
      <div class="phase-dot" id="phaseDot"></div>
      <span id="phaseText">Initializing…</span>
    </div>
  </div>

  <div class="flow" id="flow">
    <div class="flow-step" id="fs0"><div class="step-icon">📦</div><div class="step-name">Install</div></div>
    <div class="flow-step" id="fs1"><div class="step-icon">⚙️</div><div class="step-name">Setup</div></div>
    <div class="flow-step" id="fs2"><div class="step-icon">🚀</div><div class="step-name">Server</div></div>
    <div class="flow-step" id="fs3"><div class="step-icon">📡</div><div class="step-name">Request</div></div>
    <div class="flow-step" id="fs4"><div class="step-icon">⚡</div><div class="step-name">Invoice</div></div>
    <div class="flow-step" id="fs5"><div class="step-icon">💸</div><div class="step-name">Pay</div></div>
    <div class="flow-step" id="fs6"><div class="step-icon">✅</div><div class="step-name">200 OK</div></div>
  </div>

  <button class="replay-btn" id="replayBtn" onclick="startDemo()">↺ Replay</button>
</div>

<script>
const LINES = [
  // Phase 0: Install
  { text: '$ npm install l402-kit', cls: '', delay: 800, phase: 0, flow: 0 },
  { text: '\nadded 1 package in 1.2s', cls: 'output', delay: 1400 },
  { text: '\n', cls: '', delay: 200 },

  // Phase 1: Setup (code appears)
  { text: '$ cat server.ts', cls: '', delay: 600, phase: 1, flow: 1 },
  { text: '\nimport express from "express";', cls: 'blue', delay: 300 },
  { text: '\nimport { l402 } from "l402-kit";', cls: 'orange', delay: 200 },
  { text: '\n', cls: '', delay: 100 },
  { text: '\nconst app = express();', cls: 'purple', delay: 200 },
  { text: '\n', cls: '', delay: 100 },
  { text: '\napp.get("/premium", l402({', cls: 'green', delay: 200 },
  { text: '\n  priceSats: 100,', cls: 'output', delay: 200 },
  { text: '\n  ownerLightningAddress: "you@blink.sv",', cls: 'output', delay: 200 },
  { text: '\n}), (req, res) => {', cls: 'purple', delay: 200 },
  { text: '\n  res.json({ data: "Payment confirmed ⚡" });', cls: 'green', delay: 200 },
  { text: '\n});', cls: 'purple', delay: 200 },
  { text: '\n', cls: '', delay: 100 },
  { text: '\napp.listen(3000);', cls: 'blue', delay: 300 },
  { text: '\n', cls: '', delay: 400 },

  // Phase 2: Server start
  { text: '$ npx ts-node server.ts', cls: '', delay: 600, phase: 2, flow: 2 },
  { text: '\n⚡ l402-kit server running on :3000', cls: 'orange', delay: 1200 },
  { text: '\n', cls: '', delay: 400 },

  // Phase 3: First request (no payment)
  { text: '$ curl http://localhost:3000/premium', cls: '', delay: 800, phase: 3, flow: 3 },
  { text: '\n', cls: '', delay: 800 },
  { text: '\nHTTP/1.1 402 Payment Required', cls: 'red', delay: 200 },
  { text: '\nWWW-Authenticate: L402 macaroon="eyJhbGc..."', cls: 'output', delay: 200 },
  { text: '\n', cls: '', delay: 100 },
  { text: '\n{', cls: 'output', delay: 100 },
  { text: '\n  "error": "Payment Required",', cls: 'output', delay: 150 },
  { text: '\n  "invoice": "lnbc1u1pn3q...BOLT11...",', cls: 'orange', delay: 150 },
  { text: '\n  "macaroon": "eyJhbGciOiJIUzI...",', cls: 'output', delay: 150 },
  { text: '\n  "paymentHash": "3d2e1f..."', cls: 'output', delay: 150 },
  { text: '\n}', cls: 'output', delay: 400 },
  { text: '\n', cls: '', delay: 300 },

  // Phase 4: Invoice / Pay
  { text: '# Invoice sent — client pays with Lightning wallet', cls: 'comment', delay: 800, phase: 4, flow: 4 },
  { text: '\n# SHA256(preimage) == paymentHash ✓  →  proof recorded', cls: 'comment', delay: 600 },
  { text: '\n', cls: '', delay: 600, flow: 5 },

  // Phase 5: Authenticated request
  { text: '$ curl http://localhost:3000/premium \\', cls: '', delay: 600, phase: 5, flow: 5 },
  { text: '\n  -H "Authorization: L402 eyJhbGc...:3d8f2a1b..."', cls: 'blue', delay: 400 },
  { text: '\n', cls: '', delay: 900 },
  { text: '\nHTTP/1.1 200 OK', cls: 'green', delay: 200 },
  { text: '\n', cls: '', delay: 100 },
  { text: '\n{', cls: 'output', delay: 100 },
  { text: '\n  "data": "Payment confirmed ⚡"', cls: 'green', delay: 200 },
  { text: '\n}', cls: 'output', delay: 400, flow: 6 },
  { text: '\n', cls: '', delay: 300 },

  // Done
  { text: '# ⚡ Done — your API just earned 99.7 sats', cls: 'comment', delay: 600, phase: 6 },
  { text: '\n# 0.3% fee — no banks, no chargebacks, no accounts', cls: 'comment', delay: 400 },
];

const PHASES = [
  'Phase 1 — npm install l402-kit',
  'Phase 2 — 3 lines of server code',
  'Phase 3 — Server running on :3000',
  'Phase 4 — Client calls API (no token)',
  'Phase 5 — Server returns 402 + invoice',
  'Phase 6 — Lightning payment confirmed',
  'Phase 7 — 200 OK + data',
];

let running = false;

function setPhase(idx) {
  const label = document.getElementById('phaseLabel');
  const dot = document.getElementById('phaseDot');
  const text = document.getElementById('phaseText');
  label.className = 'phase-label active';
  dot.className = 'phase-dot active';
  text.textContent = PHASES[idx] || PHASES[PHASES.length - 1];
}

function setFlow(idx) {
  for (let i = 0; i <= idx; i++) {
    const el = document.getElementById('fs' + i);
    if (el) el.classList.add('active');
  }
}

function startDemo() {
  if (running) return;
  running = true;
  document.getElementById('replayBtn').classList.remove('visible');
  document.getElementById('termBody').innerHTML = '';
  document.getElementById('progressBar').style.width = '0';
  for (let i = 0; i < 7; i++) {
    const el = document.getElementById('fs' + i);
    if (el) el.classList.remove('active');
  }

  const totalDelay = LINES.reduce((s, l) => s + (l.delay || 0), 0);
  let elapsed = 0;
  let cursorEl = null;

  LINES.forEach((line, idx) => {
    elapsed += line.delay || 0;
    const t = elapsed;

    setTimeout(() => {
      if (cursorEl) cursorEl.remove();
      const span = document.createElement('span');
      span.className = 'line visible ' + (line.cls || 'cmd');
      let txt = line.text;
      if (txt.startsWith('$')) {
        span.innerHTML = '<span class="prompt">$</span><span class="cmd">' + txt.slice(1) + '</span>';
      } else {
        span.textContent = txt;
      }
      document.getElementById('termBody').appendChild(span);

      if (line.phase !== undefined) setPhase(line.phase);
      if (line.flow !== undefined) setFlow(line.flow);

      // cursor after last item
      if (idx === LINES.length - 1) {
        cursorEl = document.createElement('span');
        cursorEl.className = 'cursor';
        document.getElementById('termBody').appendChild(cursorEl);
        document.getElementById('replayBtn').classList.add('visible');
        running = false;
      }

      // progress bar
      document.getElementById('progressBar').style.width = Math.min(100, (t / totalDelay) * 100) + '%';

      // scroll
      const body = document.getElementById('termBody');
      body.scrollTop = body.scrollHeight;
    }, t);
  });
}

window.addEventListener('load', () => setTimeout(startDemo, 400));
</script>
</body>
</html>
