<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="l402-kit">
  <title>l402-kit</title>
  <defs>
    <clipPath id="c">
      <rect width="400" height="400" rx="72"/>
    </clipPath>
    <!-- Contained glow — single energy source, not decoration -->
    <filter id="bolt-energy" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base — near-black with subtle blue cast, premium tech feel -->
  <rect width="400" height="400" rx="72" fill="#07080E"/>

  <!-- Ghost model number — Ken Okuyama / Porsche technique
       The product's identity number, scaled to architecture.
       Faint enough to be subliminal, bold enough to anchor the mark. -->
  <text
    x="205" y="295"
    font-family="'Inter','Helvetica Neue','Arial',sans-serif"
    font-weight="900" font-size="240"
    fill="#F7931A" opacity="0.05"
    text-anchor="middle"
    clip-path="url(#c)">402</text>

  <!-- Lightning bolt — energy glow layer (restrained, single pulse) -->
  <polygon
    points="210,40 100,220 190,220 150,360 300,160 210,160"
    fill="#F7931A" opacity="0.22"
    filter="url(#bolt-energy)"/>

  <!-- Lightning bolt — primary flat form, precision geometry -->
  <!-- Derived from the HTTP ⚡ 402 mark, scaled to 1:1 proportion -->
  <polygon
    points="210,40 100,220 190,220 150,360 300,160 210,160"
    fill="#F7931A"/>

  <!-- Upper face specular — machined precision, light from upper-left -->
  <polygon
    points="210,40 100,220 190,220 210,160"
    fill="white" opacity="0.09"/>

  <!-- Precision border — jewel-like containment -->
  <rect width="400" height="400" rx="72"
    fill="none" stroke="#F7931A" stroke-width="1.5" opacity="0.20"/>
</svg>
