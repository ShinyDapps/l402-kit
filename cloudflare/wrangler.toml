name = "l402kit-api"
main = "src/worker.ts"
compatibility_date = "2026-04-24"
compatibility_flags = ["nodejs_compat"]
account_id = "08a1be0a8add759a13042f63b8a41b9a"

[vars]
ENVIRONMENT = "production"

# Secrets (set via: wrangler secret put VAR_NAME)
# SUPABASE_URL
# SUPABASE_ANON_KEY
# SUPABASE_SERVICE_KEY
# SPLIT_SECRET
# DASHBOARD_SECRET
# RESEND_API_KEY
# BLINK_API_KEY
# BLINK_WALLET_ID
# BLINK_WEBHOOK_SECRET

[[kv_namespaces]]
binding = "demo_preimages"
id = "cc84c53bdb464a1391313565ff920d16"

[[routes]]
pattern = "l402kit.com/docs"
zone_name = "l402kit.com"

[[routes]]
pattern = "l402kit.com/docs/*"
zone_name = "l402kit.com"

[[routes]]
pattern = "l402kit.com/api/*"
zone_name = "l402kit.com"

[[routes]]
pattern = "l402kit.com/.well-known/lnurlp/*"
zone_name = "l402kit.com"

[[routes]]
pattern = "l402kit.com/.well-known/agent.json"
zone_name = "l402kit.com"

[[routes]]
pattern = "l402kit.com/.well-known/l402.json"
zone_name = "l402kit.com"

[[routes]]
pattern = "l402kit.com/.well-known/402index-verify.txt"
zone_name = "l402kit.com"

[[routes]]
pattern = "l402kit.com/badge/*"
zone_name = "l402kit.com"

