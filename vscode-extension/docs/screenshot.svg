  <rect x="112" y="52" width="32" height="20" rx="4" fill="#3c3c3c"/>
  <text x="128" y="66" font-family="'Segoe UI', sans-serif" font-size="11" fill="#858585" text-anchor="middle">PT</text>
  <rect x="150" y="52" width="32" height="20" rx="4" fill="#3c3c3c"/>
