  <circle cx="78" cy="440" r="8" fill="#F7931A" opacity="0.15"/>
  <text x="78" y="444" font-family="monospace" font-size="10" fill="#F7931A" text-anchor="middle">⚡</text>
  <text x="96" y="436" font-family="'Segoe UI', sans-serif" font-size="11" fill="#cccccc">/ai/weather</text>
  <text x="96" y="450" font-family="'Segoe UI Mono', monospace" font-size="10" fill="#555">14s ago · preimage: 9ef1...c3b7</text>
  <text x="412" y="444" font-family="'Segoe UI Mono', monospace" font-size="12" font-weight="700" fill="#F7931A" text-anchor="end">+21 sats</text>

  <!-- payment row 3 -->
  <rect x="58" y="466" width="372" height="40" rx="6" fill="#2a2a2a"/>
  <circle cx="78" cy="486" r="8" fill="#F7931A" opacity="0.15"/>
  <text x="78" y="490" font-family="monospace" font-size="10" fill="#F7931A" text-anchor="middle">⚡</text>
  <text x="96" y="482" font-family="'Segoe UI', sans-serif" font-size="11" fill="#cccccc">/data/market</text>
  <text x="96" y="496" font-family="'Segoe UI Mono', monospace" font-size="10" fill="#555">1m ago · preimage: 7ab3...d041</text>
  <text x="412" y="490" font-family="'Segoe UI Mono', monospace" font-size="12" font-weight="700" fill="#F7931A" text-anchor="end">+500 sats</text>

