      <stop offset="0%" stop-color="#F7931A"/>
      <stop offset="100%" stop-color="#C97400"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#252526"/>
    </linearGradient>
  </defs>

  <!-- VS Code sidebar background -->
  <rect width="460" height="580" rx="10" fill="url(#bg)"/>

  <!-- Top activity bar strip -->
  <rect width="48" height="580" rx="0" fill="#333333"/>
  <!-- lightning bolt icon active -->
  <rect x="10" y="12" width="28" height="28" rx="4" fill="#F7931A" opacity="0.2"/>
  <polygon points="28,14 19,28 25,28 22,40 34,25 28,25" fill="#F7931A"/>
  <!-- other icons -->
  <rect x="13" y="56" width="22" height="2" rx="1" fill="#858585"/>
  <rect x="13" y="62" width="22" height="2" rx="1" fill="#858585"/>
  <rect x="13" y="68" width="16" height="2" rx="1" fill="#858585"/>
  <rect x="13" y="92" width="22" height="4" rx="2" fill="#858585" opacity="0.5"/>
  <rect x="13" y="104" width="22" height="4" rx="2" fill="#858585" opacity="0.5"/>
  <rect x="13" y="116" width="18" height="4" rx="2" fill="#858585" opacity="0.5"/>

  <!-- Main panel area -->
  <!-- Header bar -->
