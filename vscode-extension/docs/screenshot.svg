  <circle cx="78" cy="394" r="8" fill="#F7931A" opacity="0.15"/>
  <text x="78" y="398" font-family="monospace" font-size="10" fill="#F7931A" text-anchor="middle">⚡</text>
  <text x="96" y="390" font-family="'Segoe UI', sans-serif" font-size="11" fill="#cccccc">/api/premium</text>
  <text x="96" y="404" font-family="'Segoe UI Mono', monospace" font-size="10" fill="#555">2s ago · preimage: 4bcd...f8a2</text>
